manifest_version: "1.0"
spec_version: "1.0"

globals:
  start_step: "process_data"
  budgets:
    max_total_attempts: 10
    max_attempts_per_step: 3
    max_cost_dollars: 1.0

steps:
  process_data:
    agent_id: "data_processor"
    description: "Process input data"
    pre_specs:
      - "has_input_data"
    post_specs:
      - "output_not_empty"
    retry_policy:
      max_attempts: 3
      backoff_seconds: 0.5
      backoff_multiplier: 2.0

edges:
  - from_step: "process_data"
    to_step: "__complete__"
    when: "post_ok"
    priority: 10

  - from_step: "process_data"
    to_step: "__fail__"
    when: "attempts('process_data') >= 3"
    priority: 1
